name: mistpos
description: "Inventory App , track sales and reports"
publish_to: "none"

version: 1.0.4+22

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  exui: ^1.0.7
  iconify_flutter: ^0.0.7
  build_runner: ^2.4.13
  path_provider: ^2.1.5
  radio_group_v2: ^3.3.1
  grouped_list: ^6.0.0
  get_storage: ^2.1.1
  dio: ^5.9.0
  mobile_device_identifier: ^0.0.3
  country_picker: ^2.0.27
  loading_animation_widget: ^1.3.0
  pull_to_refresh: ^2.0.0
  pinput: ^6.0.2
  date_picker_plus: ^6.0.0
  fl_chart: ^1.1.1
  flutter_barcode_scanner_plus: ^3.0.8
  data_table_2: ^2.6.0
  pos_universal_printer: ^0.2.10
  flutter_blue_plus: ^2.0.0
  permission_handler: ^12.0.1
  esc_pos_utils_plus: ^2.0.4
  image_picker: ^1.2.1
  path: ^1.9.1
  flutter_barcode_listener: ^0.1.4
  flutter_animate: ^4.5.2
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^20.1.0
  webview_flutter: ^4.8.0
  pdf_maker: ^1.1.0
  open_file: ^3.5.10
  file_picker: ^10.3.6
  device_info_plus: ^12.3.0
  flutter_launcher_icons: ^0.14.4
  isar_plus: ^1.2.2
  isar_plus_flutter_libs: ^1.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher.png"
  adaptive_icon_foreground: "assets/launcher.png"
  adaptive_icon_background: "#193452"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/avatars/
    - assets/tutorials/
